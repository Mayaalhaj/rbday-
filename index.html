<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0b1f5c,#1a3fb5);
color:white;
overflow:hidden;
}

h1{
margin-top:30px;
}

#cake{
position:relative;
width:160px;
margin:80px auto;
}

.layer{
width:160px;
height:40px;
background:#cc2f6b;
border-radius:15px;
margin:8px auto;
position:relative;
transform:translateY(-250px);
opacity:0;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

.frost{
position:absolute;
top:-10px;
width:100%;
height:12px;
background:#ff7fb2;
border-radius:20px;
}

.candle-holder{
position:absolute;
top:-40px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.candle{
width:8px;
height:32px;
background:#ffd84d;
border-radius:3px;
position:relative;
}

.flame{
position:absolute;
width:10px;
height:12px;
background:orange;
border-radius:50%;
top:-12px;
left:-1px;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

button{
margin-top:20px;
padding:14px 22px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff4fa3;
color:white;
cursor:pointer;
}

#instruction{
display:none;
font-size:22px;
margin-top:15px;
}

#message{
display:none;
font-size:28px;
margin-top:25px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Birthday Cake 🎂</h1>

<div id="cake">

<div class="layer" id="layer3">

<div class="frost"></div>

<div class="candle-holder">
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
</div>

</div>

<div class="layer" id="layer2"><div class="frost"></div></div>
<div class="layer" id="layer1"><div class="frost"></div></div>

</div>

<button onclick="startListening()">Blow 💨</button>

<div id="instruction">Blow the candles 💨</div>

<div id="message">🎉 Happy Birthday Mr. Hatem Alhakim! 🎂🎆</div>

<audio id="song" src="birthday.mp3"></audio>

<canvas id="confetti"></canvas>

<script>

/* cake falling animation */

function animateCake(){

let layers=[
document.getElementById("layer3"),
document.getElementById("layer2"),
document.getElementById("layer1")
]

layers.forEach((layer,i)=>{

setTimeout(()=>{

layer.style.transition="all 0.8s ease"
layer.style.transform="translateY(0)"
layer.style.opacity="1"

},i*500)

})

}

animateCake()

/* microphone detection */

async function startListening(){

document.getElementById("instruction").style.display="block"

const stream=await navigator.mediaDevices.getUserMedia({audio:true})

const audioContext=new AudioContext()

const mic=audioContext.createMediaStreamSource(stream)

const analyser=audioContext.createAnalyser()

mic.connect(analyser)

const data=new Uint8Array(analyser.frequencyBinCount)

function detect(){

analyser.getByteFrequencyData(data)

let volume=data.reduce((a,b)=>a+b)/data.length

if(volume>60){

blowCandles()

return

}

requestAnimationFrame(detect)

}

detect()

}

/* blow candles */

function blowCandles(){

let flames=document.querySelectorAll(".flame")

flames.forEach((f,i)=>{

setTimeout(()=>{
f.style.opacity=0
f.style.transform="scale(0)"
},i*300)

})

document.getElementById("instruction").style.display="none"
document.getElementById("message").style.display="block"

document.getElementById("song").play()

confetti()
fireworks()

}

/* confetti */

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
size:Math.random()*8+4,
speed:Math.random()*3+2
})

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height)p.y=0

})

requestAnimationFrame(update)

}

update()

}

/* fireworks */

function fireworks(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

setInterval(()=>{

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<20;i++){

ctx.beginPath()

ctx.arc(
x+Math.random()*60-30,
y+Math.random()*60-30,
4,
0,
Math.PI*2
)

ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`
ctx.fill()

}

},800)

}

</script>

</body>
</html>
