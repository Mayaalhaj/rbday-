<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday!</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9ec4,#ffd6e8);
overflow:hidden;
}

h1{
margin-top:40px;
color:#d6006c;
}

#cake{
font-size:110px;
margin-top:40px;
}

.flame{
font-size:30px;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{opacity:1; transform:translateY(0px);}
to{opacity:0.6; transform:translateY(-3px);}
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff2e88;
color:white;
margin-top:20px;
}

#message{
display:none;
font-size:26px;
margin-top:30px;
color:#8a004b;
}

#photo{
display:none;
margin-top:20px;
width:220px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🎉 Blow the Candles 🎉</h1>

<div id="cake">
🎂 <span class="flame">🔥</span><span class="flame">🔥</span><span class="flame">🔥</span>
</div>

<br>

<button onclick="startListening()">Blow Candles 💨</button>

<div id="message">
💖 Happy Birthday! 💖 <br><br>
I hope all your wishes come true 🎂✨
</div>

<img id="photo" src="sister.jpg">

<audio id="music">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

let listening=false;

async function startListening(){

const stream = await navigator.mediaDevices.getUserMedia({audio:true});

const audioContext = new AudioContext();
const mic = audioContext.createMediaStreamSource(stream);

const analyser = audioContext.createAnalyser();

mic.connect(analyser);

const data = new Uint8Array(analyser.frequencyBinCount);

listening=true;

function detect(){

if(!listening) return;

analyser.getByteFrequencyData(data);

let volume=data.reduce((a,b)=>a+b)/data.length;

if(volume>60){

blowCandles();
listening=false;
return;

}

requestAnimationFrame(detect);

}

detect();

}

function blowCandles(){

document.getElementById("cake").innerHTML="🎂";

document.getElementById("message").style.display="block";

document.getElementById("photo").style.display="block";

document.getElementById("music").play();

confetti();

fireworks();

}

function confetti(){

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+4,
speed:Math.random()*3+2
});
}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let p of pieces){

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fillRect(p.x,p.y,p.size,p.size);

p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
}

}

requestAnimationFrame(update);

}

update();

}

function fireworks(){

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

setInterval(()=>{

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<20;i++){

ctx.beginPath();
ctx.arc(x+Math.random()*60-30,y+Math.random()*60-30,4,0,Math.PI*2);
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
ctx.fill();

}

},800);

}

</script>

</body>
</html>
